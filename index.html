<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <img id="header-banner-img" src="./images/banner.png"/>
            <div id="header-text">
                <h1 id="header-title">Jimmy's Diner</h1>
                <h2 id="header-slogan">The best burgers and pizzas in town.</h2>
            </div>

        </header>
        <main>
            <section id="menu-items-section">
                <!-- This is where the menu items from the data will go -->
            </section>
            <section class="pay-section hide" id="pay-section">
                <h1>Your order</h1>
                <ul id="pay-item-lines">
                    <!-- This is where the menu items selected will go -->
                </ul>
                <button id="confirm-btn">Complete order</button>
            </section>
            <div class="card-pop-up-overlay hide" id="card-pop-up-overlay"></div>
            <form class="card-pop-up hide" id="card-pop-up">
                <h1 id="card-pop-up-title">Enter Card Details</h1>
                <input id="card-pop-up-name" type="text" placeholder="Enter your name" required/>
                <input id="card-pop-up-card" type="text" inputmode="numeric" placeholder="Enter card number" required/>
                <input id="card-pop-up-cvv" type="text" inputmode="numeric" placeholder="Enter CVV" required/>
                <button id="card-pop-up-pay-btn">Pay</button>
            </form>
            <div id="confirm-message">
                <!-- This is where the confirmation message will appear -->
                <!-- <h1>Thanks, James! Your order is on its way!</h1> -->
            </div>
        </main>
	<script src="index.js" type="module"></script>
    </body>
</html>
